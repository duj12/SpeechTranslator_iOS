name: TranslatorApp
options:
  bundleIdPrefix: com.translator
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  TranslatorApp:
    type: application
    platform: iOS
    sources:
      - path: TranslatorApp/Sources
      - path: TranslatorApp/Resources
    dependencies:
      - package: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.translator.app
        INFOPLIST_FILE: TranslatorApp/Resources/Info.plist
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"

  TranslatorAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TranslatorApp/Tests
    dependencies:
      - target: TranslatorApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.translator.app.tests
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.4"
